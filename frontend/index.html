<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Cinema — Đặt vé</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">Cinema</div>
    </header>

    <main>
      <div id="global-flash" class="flash hidden" role="status"></div>

      <section id="view-booking">
        <div id="checkout-success-panel" class="checkout-success hidden" role="status" aria-live="polite">
          <div class="checkout-success__icon" aria-hidden="true">✓</div>
          <div class="checkout-success__body">
            <h3 class="checkout-success__title">Đặt vé thành công</h3>
            <p class="checkout-success__lead">
              Mã đặt chỗ: <strong id="success-booking-code">—</strong> · Phim: <strong id="success-movie-title">—</strong>
            </p>
            <p class="checkout-success__meta">Tổng tiền: <strong id="success-total">—</strong></p>
            <p id="success-email-line" class="checkout-success__meta hint"></p>
            <p id="success-seats-line" class="checkout-success__meta"></p>
            <div class="checkout-success__actions">
              <button type="button" class="btn btn-secondary" id="btn-checkout-success-close">Đóng</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="steps" id="booking-steps"></div>

          <div id="book-step-1">
            <h3>1. Chọn phim</h3>
            <div class="form-row">
              <button type="button" class="btn btn-secondary" id="btn-reload-movies">Tải lại danh sách</button>
            </div>
            <div class="movie-grid" id="movie-pick-grid"></div>
          </div>

          <div id="book-step-2" class="hidden">
            <h3>2. Chọn suất chiếu</h3>
            <p id="book-movie-title" class="hint"></p>
            <div class="showtime-list" id="showtime-pick-list"></div>
            <button type="button" class="btn btn-ghost" id="btn-back-movies">← Chọn phim khác</button>
          </div>

          <div id="book-step-3" class="hidden">
            <h3>3. Chọn ghế &amp; giữ chỗ</h3>
            <p id="book-showtime-detail" class="hint"></p>
            <div class="screen">Màn hình</div>
            <div class="seat-map-wrap">
              <div class="seat-map" id="seat-map-root"></div>
            </div>
            <p id="seat-selection-summary" class="hint"></p>
            <div class="form-row">
              <button type="button" class="btn" id="btn-create-hold" disabled>Tạo hold</button>
            </div>
          </div>

          <div id="book-step-4" class="hidden">
            <h3>4. Thanh toán &amp; xác nhận</h3>
            <div id="hold-checkout-banner" class="hold-banner hidden" role="status" aria-live="polite"></div>
            <div class="grid-2">
              <label> Họ và tên <input type="text" id="co-name" autocomplete="name" /> </label>
              <label> Email <input type="email" id="co-email" autocomplete="email" /> </label>
              <label> Điện thoại <input type="tel" id="co-phone" autocomplete="tel" /> </label>
              <label>
                Phương thức
                <select id="co-pay-method">
                  <option value="CREDIT_CARD">CREDIT_CARD</option>
                  <option value="DEBIT_CARD">DEBIT_CARD</option>
                  <option value="MOCK">MOCK</option>
                  <option value="BANK_TRANSFER">BANK_TRANSFER</option>
                </select>
              </label>
              <label> Số thẻ (tuỳ chọn) <input type="text" id="co-card" /> </label>
              <label> Chủ thẻ <input type="text" id="co-cardholder" /> </label>
              <label> Tổng tiền (VND) <input type="text" id="co-total" readonly /> </label>
            </div>
            <div class="form-row">
              <button type="button" class="btn" id="btn-checkout">Thanh toán</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
