server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: '*'
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: '*'
      routes:
        - id: menu-service
          uri: http://menu-service:5000
          predicates:
            - Path=/menu/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: http://order-service:5000
          predicates:
            - Path=/orders/**
        - id: delivery-payment-service
          uri: http://delivery-payment-service:5000
          predicates:
            - Path=/delivery/**
          filters:
            - StripPrefix=1
