openapi: 3.0.3
info:
  title: Movie Service API
  version: 1.0.0
  description: Movies, cinemas, and showtimes (internal paths; gateway exposes same paths under http://gateway:8080)

servers:
  - url: http://localhost:5001
    description: Direct service (default compose host port)
  - url: http://localhost:8080
    description: Via API gateway

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: movie-service }

  /movies:
    get:
      summary: List movies
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [ACTIVE, INACTIVE] }
        - in: query
          name: genre
          schema: { type: string }
      responses:
        '200': { description: OK }
    post:
      summary: Create movie
      responses:
        '201': { description: Created }

  /movies/{movieId}:
    parameters:
      - name: movieId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    get:
      summary: Get movie by id
      responses:
        '200': { description: OK }
        '404': { description: Not found }
    put:
      summary: Update movie
      responses:
        '200': { description: OK }
    delete:
      summary: Delete movie (blocked if showtimes exist)
      responses:
        '204': { description: No content }
        '400': { description: Has showtimes }

  /movies/{movieId}/showtimes:
    get:
      summary: List showtimes for a movie
      parameters:
        - name: movieId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }

  /cinemas:
    get:
      summary: List cinemas
      responses:
        '200': { description: OK }
    post:
      summary: Create cinema
      responses:
        '201': { description: Created }

  /cinemas/{cinemaId}:
    get:
      summary: Get cinema
      responses:
        '200': { description: OK }
        '404': { description: Not found }

  /showtimes:
    get:
      summary: List showtimes
      parameters:
        - in: query
          name: date
          schema: { type: string, format: date }
        - in: query
          name: cinemaId
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: OK }
    post:
      summary: Create showtime
      responses:
        '201': { description: Created }

  /showtimes/{showtimeId}:
    get:
      summary: Get showtime
      responses:
        '200': { description: OK }
        '404': { description: Not found }
    put:
      summary: Update showtime
      responses:
        '200': { description: OK }
    delete:
      summary: Delete showtime
      responses:
        '204': { description: No content }
