openapi: 3.0.3
info:
  title: Order Service API
  version: 1.0.0
  description: |
    Order Service owns orders and order items. Pricing is sourced from Menu Service via price quotes.

servers:
  - url: http://localhost:5002
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /orders:
    get:
      summary: List all orders
      operationId: listOrders
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      summary: Create order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'

  /orders/{id}:
    get:
      summary: Get order by id
      operationId: getOrder
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/Error'

  /orders/{id}/items:
    post:
      summary: Add items to an existing order
      operationId: addOrderItems
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/OrderLine'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /orders/{orderId}/items/{itemId}:
    delete:
      summary: Remove one item line from an order
      operationId: deleteOrderItem
      parameters:
        - in: path
          name: orderId
          required: true
          schema: { type: integer, format: int64 }
        - in: path
          name: itemId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /orders/{id}/status:
    patch:
      summary: Update order status
      operationId: updateOrderStatus
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/Error'

components:
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          example: ok

    Error:
      type: object
      properties:
        error:
          type: string

    Order:
      type: object
      properties:
        id: { type: integer, format: int64 }
        customerName: { type: string }
        status: { type: string }
        totalAmount: { type: number, format: double }
        createdAt: { type: string, format: date-time }
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
      required: [id, customerName, status, totalAmount, createdAt, items]

    OrderItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        itemKind: { type: string, example: FOOD }
        menuItemId: { type: integer, format: int64 }
        size: { type: string, nullable: true, example: L }
        menuItemName: { type: string }
        quantity: { type: integer }
        unitPrice: { type: number, format: double }
        lineTotal: { type: number, format: double }
      required: [id, itemKind, menuItemId, menuItemName, quantity, unitPrice, lineTotal]

    CreateOrderRequest:
      type: object
      properties:
        customerName: { type: string, maxLength: 200 }
        lines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderLine'
      required: [customerName, lines]

    OrderLine:
      type: object
      description: Provide exactly one of menuItemId or comboId.
      properties:
        menuItemId: { type: integer, format: int64, nullable: true }
        comboId: { type: integer, format: int64, nullable: true }
        quantity: { type: integer, minimum: 1 }
        size:
          type: string
          nullable: true
          enum: [S, M, L]
          description: Only used when menuItemId is provided.
      required: [quantity]

    OrderStatusUpdate:
      type: object
      properties:
        status: { type: string }
      required: [status]
