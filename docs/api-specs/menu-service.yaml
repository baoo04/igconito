openapi: 3.0.3
info:
  title: Menu Service API
  version: 1.0.0
  description: |
    Menu Service owns menu catalog data (categories, foods) and is source of truth for pricing.
servers:
  - url: http://localhost:5001
    description: Local (direct)

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  /categories:
    get:
      summary: List categories
      operationId: listCategories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      summary: Create category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'

  /categories/{id}:
    get:
      summary: Get category
      operationId: getCategory
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/Error'
    put:
      summary: Update category
      operationId: updateCategory
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete category
      operationId: deleteCategory
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: No content }
        '404':
          $ref: '#/components/responses/Error'

  /foods:
    get:
      summary: Search foods
      operationId: searchFoods
      parameters:
        - in: query
          name: categoryId
          schema: { type: integer, format: int64 }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: availableOnly
          schema: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Food'
    post:
      summary: Create food item
      operationId: createFood
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoodCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Food'

  /foods/{id}:
    get:
      summary: Get food item (includes review stats)
      operationId: getFood
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Food'
        '404':
          $ref: '#/components/responses/Error'
    put:
      summary: Update food item
      operationId: updateFood
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoodCreate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Food'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete food item
      operationId: deleteFood
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: No content }
        '404':
          $ref: '#/components/responses/Error'

  /foods/{id}/price:
    get:
      summary: Quote price for a food item (dynamic pricing)
      operationId: quoteFoodPrice
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: size
          required: false
          schema:
            type: string
            enum: [S, M, L]
            default: M
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceQuote'
        '404':
          $ref: '#/components/responses/Error'

  /foods/{id}/reviews:
    get:
      summary: List reviews for a food item
      operationId: listFoodReviews
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
        '404':
          $ref: '#/components/responses/Error'

  /foods/{id}/review:
    post:
      summary: Add a review for a food item
      operationId: addFoodReview
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '404':
          $ref: '#/components/responses/Error'

  /combos:
    get:
      summary: List combos
      operationId: listCombos
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Combo'
    post:
      summary: Create combo
      operationId: createCombo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComboCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Combo'

  /combos/{id}:
    get:
      summary: Get combo
      operationId: getCombo
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Combo'
        '404':
          $ref: '#/components/responses/Error'

  /combos/{id}/price:
    get:
      summary: Quote price for a combo (dynamic pricing)
      operationId: quoteComboPrice
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceQuote'
        '404':
          $ref: '#/components/responses/Error'

components:
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Health:
      type: object
      properties:
        status:
          type: string
          example: ok

    Error:
      type: object
      properties:
        error:
          type: string

    Category:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string, nullable: true }
      required: [id, name]

    CategoryCreate:
      type: object
      properties:
        name: { type: string, maxLength: 200 }
        description: { type: string, maxLength: 1000, nullable: true }
      required: [name]

    Food:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number, format: double }
        available: { type: boolean }
        categoryId: { type: integer, format: int64 }
        categoryName: { type: string }
        averageRating: { type: number, format: double, nullable: true }
        reviewCount: { type: integer, format: int64, nullable: true }
      required: [id, name, price, available, categoryId, categoryName]

    FoodCreate:
      type: object
      properties:
        name: { type: string, maxLength: 200 }
        description: { type: string, maxLength: 1000, nullable: true }
        price: { type: number, format: double }
        available: { type: boolean }
        categoryId: { type: integer, format: int64 }
      required: [name, price, categoryId]

    PriceQuote:
      type: object
      properties:
        kind: { type: string, example: FOOD }
        id: { type: integer, format: int64 }
        name: { type: string }
        available: { type: boolean }
        basePrice: { type: number, format: double }
        unitPrice: { type: number, format: double }
        size: { type: string, nullable: true, example: L }
        appliedRules:
          type: array
          items: { type: string }
      required: [kind, id, name, available, basePrice, unitPrice, appliedRules]

    Review:
      type: object
      properties:
        id: { type: integer, format: int64 }
        rating: { type: integer, example: 5 }
        comment: { type: string, nullable: true }
        authorName: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, rating, createdAt]

    ReviewCreate:
      type: object
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, maxLength: 2000, nullable: true }
        authorName: { type: string, maxLength: 200, nullable: true }
      required: [rating]

    Combo:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string, nullable: true }
        bundlePrice: { type: number, format: double }
        available: { type: boolean }
        items:
          type: array
          items:
            $ref: '#/components/schemas/ComboItem'
      required: [id, name, bundlePrice, available, items]

    ComboItem:
      type: object
      properties:
        foodItemId: { type: integer, format: int64 }
        foodName: { type: string }
        quantity: { type: integer }
      required: [foodItemId, foodName, quantity]

    ComboCreate:
      type: object
      properties:
        name: { type: string, maxLength: 200 }
        description: { type: string, maxLength: 1000, nullable: true }
        bundlePrice: { type: number, format: double }
        available: { type: boolean }
        items:
          type: array
          items:
            type: object
            properties:
              foodItemId: { type: integer, format: int64 }
              quantity: { type: integer, minimum: 1 }
            required: [foodItemId, quantity]
      required: [name, bundlePrice, items]
