server:
  port: 5000

spring:
  application:
    name: seat-availability-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:seat_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

cinema:
  seat:
    default-price: ${SEAT_DEFAULT_PRICE:90000}
    rows: ${SEAT_LAYOUT_ROWS:8}
    seats-per-row: ${SEAT_LAYOUT_SEATS_PER_ROW:12}
  hold:
    ttl-minutes: ${HOLD_TTL_MINUTES:5}

movie-service:
  # Set MOVIE_SERVICE_BASE_URL for local dev (e.g. http://localhost:5001)
  base-url: ${MOVIE_SERVICE_BASE_URL:http://movie-service:5000}

logging:
  level:
    root: INFO
    com.cinema.seat: DEBUG
