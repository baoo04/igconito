services:
  payment-service:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql-payment
      DB_PORT: 3306
      DB_NAME: payment_db
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      - mysql-payment

  mysql-payment:
    image: mysql:8
    container_name: mysql-payment
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
