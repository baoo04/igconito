server:
  port: ${SERVER_PORT:5000}

spring:
  application:
    name: menu-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:menu_service_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${MYSQL_USER:foodorder}
    password: ${MYSQL_PASSWORD:foodorder}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

menu:
  pricing:
    zone-id: ${MENU_PRICING_ZONE_ID:Asia/Ho_Chi_Minh}
    happy-hour-start: ${MENU_HAPPY_HOUR_START:18:00}
    happy-hour-end: ${MENU_HAPPY_HOUR_END:20:00}
    happy-hour-discount-percent: ${MENU_HAPPY_HOUR_DISCOUNT_PERCENT:10}
    size-multipliers:
      S: 1.00
      M: 1.00
      L: 1.20
